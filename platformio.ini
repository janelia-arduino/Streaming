[platformio]
; Default example only. Use `python tools/pio_task.py ... --example ...` or the
; Pixi tasks to switch examples without editing this file.
src_dir = examples/StreamingExample
; src_dir = examples/StreamingTests
lib_dir = src
default_envs = teensy41

[common_env_data]
build_flags =
    -Isrc

[env]
lib_ldf_mode = off
build_flags =
    ${common_env_data.build_flags}
monitor_echo = yes
monitor_eol = LF
monitor_filters =
    send_on_enter
    colorize
monitor_speed = 115200

[env:teensy41]
platform = teensy
framework = arduino
board = teensy41
upload_protocol = teensy-cli

[env:mega]
platform = atmelavr
framework = arduino
board = megaatmega2560

[env:uno]
platform = atmelavr
framework = arduino
board = uno

; pio run -e teensy41 --target upload --upload-port /dev/ttyACM0
; pio run -e teensy41 -t envdump
; pio device monitor
